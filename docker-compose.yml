services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: devopscore
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: devopscore
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devopscore"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "80:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: devopscore
      DB_NAME: devopscore
      DB_SSLMODE: disable
      PORT: "8080"
      GIN_MODE: release
    volumes:
      - backups:/app/backups

volumes:
  pgdata:
  backups:
