{{define "content"}}
<div x-data="adminUsersPage()" x-init="init()">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-[#f1f5f9]">Admin Panel — Users</h1>
    <button @click="openCreate()" class="px-4 py-2 text-sm font-medium rounded-lg bg-[#3b82f6] text-white hover:bg-[#2563eb] transition-colors btn-press">
      + Add User
    </button>
  </div>

  <!-- Search -->
  <div class="mb-4">
    <input type="text" x-model="search" @input.debounce.300ms="fetchUsers()" placeholder="Search by name..." class="w-72 rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] text-[#f1f5f9] px-3 py-2 text-sm focus:ring-2 focus:ring-[#3b82f6] placeholder-[#94a3b8]">
  </div>

  <!-- Loading: skeleton -->
  <template x-if="loading">
    <div class="space-y-4 py-6">
      <div class="h-12 w-full rounded-xl bg-[#1a2236] animate-pulse"></div>
      <div class="h-12 w-full rounded-xl bg-[#1a2236] animate-pulse"></div>
      <div class="h-12 w-full rounded-xl bg-[#1a2236] animate-pulse"></div>
      <div class="h-12 w-full rounded-xl bg-[#1a2236] animate-pulse"></div>
    </div>
  </template>

  <!-- Users table -->
  <template x-if="!loading">
    <div class="mission-card bg-[#1a2236] rounded-xl border border-[rgba(255,255,255,0.08)] overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-[#111827]">
              <th class="px-4 py-3 text-left font-semibold text-[#94a3b8]">ID</th>
              <th class="px-4 py-3 text-left font-semibold text-[#94a3b8]">Full Name</th>
              <th class="px-4 py-3 text-left font-semibold text-[#94a3b8]">Email</th>
              <th class="px-4 py-3 text-left font-semibold text-[#94a3b8]">Role</th>
              <th class="px-4 py-3 text-left font-semibold text-[#94a3b8]">Status</th>
              <th class="px-4 py-3 text-right font-semibold text-[#94a3b8]">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-[rgba(255,255,255,0.08)]">
            <template x-for="u in users" :key="u.ID">
              <tr class="hover:bg-white/5 transition-colors">
                <td class="px-4 py-2.5 text-xs font-mono text-[#94a3b8]" x-text="u.ID"></td>
                <td class="px-4 py-2.5 font-medium text-[#f1f5f9]" x-text="u.full_name"></td>
                <td class="px-4 py-2.5 text-xs text-[#f1f5f9]" x-text="u.email"></td>
                <td class="px-4 py-2.5">
                  <span class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs rounded-full font-medium"
                    :class="{
                      'bg-purple-500/20 text-purple-400': u.role === 'admin',
                      'bg-blue-500/20 text-blue-400': u.role === 'excess',
                      'bg-orange-500/20 text-orange-400': u.role === 'noc',
                      'bg-teal-500/20 text-teal-400': u.role === 'ip',
                      'bg-green-500/20 text-green-400': u.role === 'viewer',
                      'bg-[#475569]/30 text-[#94a3b8]': !['admin','excess','noc','ip','viewer'].includes(u.role)
                    }">
                    <span class="w-1.5 h-1.5 rounded-full shrink-0" :class="{
                      'bg-purple-400': u.role === 'admin',
                      'bg-blue-400': u.role === 'excess',
                      'bg-orange-400': u.role === 'noc',
                      'bg-teal-400': u.role === 'ip',
                      'bg-green-400': u.role === 'viewer',
                      'bg-[#94a3b8]': !['admin','excess','noc','ip','viewer'].includes(u.role)
                    }"></span>
                    <span x-text="u.role"></span>
                  </span>
                </td>
                <td class="px-4 py-2.5">
                  <span class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs rounded-full font-medium"
                    :class="u.active ? 'bg-[#10b981]/20 text-[#10b981]' : 'bg-[#ef4444]/20 text-[#ef4444]'">
                    <span class="w-1.5 h-1.5 rounded-full shrink-0" :class="u.active ? 'bg-[#10b981]' : 'bg-[#ef4444]'"></span>
                    <span x-text="u.active ? 'Active' : 'Inactive'"></span>
                  </span>
                </td>
                <td class="px-4 py-2.5 text-right">
                  <button @click="openEdit(u)" class="px-2 py-1 text-xs rounded-lg text-[#3b82f6] hover:bg-[#3b82f6]/10 transition-colors btn-press">Edit</button>
                  <button @click="confirmDelete(u)" class="px-2 py-1 text-xs rounded-lg text-[#ef4444] hover:bg-[#ef4444]/10 transition-colors btn-press">Delete</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-between px-4 py-3 border-t border-[rgba(255,255,255,0.08)]">
        <span class="text-sm text-[#94a3b8]" x-text="'Page ' + page + ' of ' + totalPages + ' (' + total + ' users)'"></span>
        <div class="flex gap-2">
          <button @click="page--; fetchUsers()" :disabled="page <= 1" class="px-3 py-1 text-sm rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#f1f5f9] disabled:opacity-40 hover:bg-white/5 transition-colors btn-press">Prev</button>
          <button @click="page++; fetchUsers()" :disabled="page >= totalPages" class="px-3 py-1 text-sm rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#f1f5f9] disabled:opacity-40 hover:bg-white/5 transition-colors btn-press">Next</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Create / Edit Modal -->
  <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="fixed inset-0 bg-black/50" @click="showModal = false"></div>
    <div class="relative bg-[#1a2236] rounded-2xl border border-[rgba(255,255,255,0.08)] w-full max-w-md mx-4 p-6 shadow-xl">
      <h2 class="text-lg font-semibold text-[#f1f5f9] mb-4" x-text="editingUser ? 'Edit User' : 'Create User'"></h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-[#94a3b8] mb-1">Full Name</label>
          <input type="text" x-model="form.full_name" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#f1f5f9] px-3 py-2 text-sm placeholder-[#475569]">
        </div>
        <div>
          <label class="block text-sm font-medium text-[#94a3b8] mb-1">Email</label>
          <input type="email" x-model="form.email" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#f1f5f9] px-3 py-2 text-sm placeholder-[#475569]">
        </div>
        <template x-if="!editingUser">
          <div>
            <label class="block text-sm font-medium text-[#94a3b8] mb-1">Password</label>
            <input type="password" x-model="form.password" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#f1f5f9] px-3 py-2 text-sm placeholder-[#475569]">
          </div>
        </template>
        <div>
          <label class="block text-sm font-medium text-[#94a3b8] mb-1">Role</label>
          <select x-model="form.role" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#f1f5f9] px-3 py-2 text-sm">
            <option value="viewer">Viewer</option>
            <option value="admin">Admin</option>
            <option value="excess">Excess</option>
            <option value="noc">NOC</option>
            <option value="ip">IP</option>
          </select>
        </div>
        <template x-if="editingUser">
          <div class="flex items-center gap-2">
            <input type="checkbox" x-model="form.active" id="activeToggle" class="rounded border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#3b82f6]">
            <label for="activeToggle" class="text-sm text-[#94a3b8]">Active</label>
          </div>
        </template>
      </div>

      <template x-if="formError">
        <p class="mt-3 text-sm text-[#ef4444]" x-text="formError"></p>
      </template>

      <div class="flex justify-end gap-3 mt-6">
        <button @click="showModal = false" class="px-4 py-2 text-sm rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#f1f5f9] hover:bg-white/5 transition-colors btn-press">Cancel</button>
        <button @click="submitForm()" :disabled="submitting" class="px-4 py-2 text-sm font-medium rounded-lg bg-[#3b82f6] text-white hover:bg-[#2563eb] disabled:opacity-50 transition-colors btn-press">
          <span x-text="submitting ? 'Saving...' : (editingUser ? 'Update' : 'Create')"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation -->
  <div x-show="showDeleteModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="fixed inset-0 bg-black/50" @click="showDeleteModal = false"></div>
    <div class="relative bg-[#1a2236] rounded-2xl border border-[rgba(255,255,255,0.08)] w-full max-w-sm mx-4 p-6 shadow-xl">
      <h2 class="text-lg font-semibold text-[#f1f5f9] mb-2">Delete User</h2>
      <p class="text-sm text-[#94a3b8] mb-6">Are you sure you want to delete <strong class="text-[#f1f5f9]" x-text="deletingUser?.full_name"></strong>? This cannot be undone.</p>
      <div class="flex justify-end gap-3">
        <button @click="showDeleteModal = false" class="px-4 py-2 text-sm rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] text-[#f1f5f9] hover:bg-white/5 transition-colors btn-press">Cancel</button>
        <button @click="deleteUser()" class="px-4 py-2 text-sm font-medium rounded-lg bg-[#ef4444] text-white hover:bg-[#dc2626] transition-colors btn-press">Delete</button>
      </div>
    </div>
  </div>
</div>

<script>
function adminUsersPage() {
  return {
    users: [],
    loading: true,
    page: 1,
    limit: 20,
    total: 0,
    totalPages: 1,
    search: '',
    showModal: false,
    showDeleteModal: false,
    editingUser: null,
    deletingUser: null,
    submitting: false,
    formError: '',
    form: { full_name: '', email: '', password: '', role: 'user', active: true },

    async init() {
      await this.fetchUsers();
    },

    async fetchUsers() {
      this.loading = true;
      let url = '/api/admin/users?page=' + this.page + '&limit=' + this.limit;
      if (this.search) url += '&search=' + encodeURIComponent(this.search);
      const res = await fetch(url);
      const data = await res.json();
      this.users = data.users || [];
      this.total = data.pagination?.total || 0;
      this.totalPages = data.pagination?.total_pages || 1;
      this.loading = false;
    },

    openCreate() {
      this.editingUser = null;
      this.form = { full_name: '', email: '', password: '', role: 'user', active: true };
      this.formError = '';
      this.showModal = true;
    },

    openEdit(user) {
      this.editingUser = user;
      this.form = { full_name: user.full_name, email: user.email, role: user.role, active: user.active };
      this.formError = '';
      this.showModal = true;
    },

    async submitForm() {
      this.submitting = true;
      this.formError = '';
      try {
        let res;
        if (this.editingUser) {
          res = await fetch('/api/admin/users/' + this.editingUser.ID, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.form)
          });
        } else {
          res = await fetch('/api/admin/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.form)
          });
        }
        const data = await res.json();
        if (!res.ok) {
          this.formError = data.error || data.details || 'Failed';
        } else {
          this.showModal = false;
          await this.fetchUsers();
        }
      } catch (e) {
        this.formError = 'Network error';
      }
      this.submitting = false;
    },

    confirmDelete(user) {
      this.deletingUser = user;
      this.showDeleteModal = true;
    },

    async deleteUser() {
      const res = await fetch('/api/admin/users/' + this.deletingUser.ID, { method: 'DELETE' });
      this.showDeleteModal = false;
      this.deletingUser = null;
      await this.fetchUsers();
    }
  }
}
</script>
{{end}}
