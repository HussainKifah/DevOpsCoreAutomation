{{define "content"}}
<div x-data="alertsPage()" x-init="init()">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-[#f1f5f9]">Alerts</h1>
    <!-- View toggle: Cards vs List -->
    <div class="flex rounded-lg border border-[rgba(255,255,255,0.08)] p-0.5 bg-[#1a2236]">
      <button @click="alertView = 'cards'"
        :class="alertView === 'cards' ? 'bg-[#3b82f6] text-white' : 'text-[#94a3b8] hover:text-[#f1f5f9]'"
        class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors">Cards</button>
      <button @click="alertView = 'list'"
        :class="alertView === 'list' ? 'bg-[#3b82f6] text-white' : 'text-[#94a3b8] hover:text-[#f1f5f9]'"
        class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors">List</button>
    </div>
  </div>

  <!-- Loading: skeleton -->
  <template x-if="loading">
    <div class="space-y-4 py-6">
      <div class="h-8 w-48 rounded-lg bg-[#1a2236] animate-pulse"></div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="h-24 rounded-xl bg-[#1a2236] animate-pulse"></div>
        <div class="h-24 rounded-xl bg-[#1a2236] animate-pulse"></div>
        <div class="h-24 rounded-xl bg-[#1a2236] animate-pulse"></div>
      </div>
    </div>
  </template>

  <template x-if="!loading">
    <div>
      <!-- All Clear empty state -->
      <template x-if="powerByHost.length === 0 && portsByHost.length === 0 && healthAlertCount === 0">
        <div class="flex flex-col items-center justify-center py-20 text-center">
          <svg class="w-16 h-16 text-[#10b981] mb-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation: checkDraw 1s ease-out forwards;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="50" stroke-dashoffset="0" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p class="text-xl font-semibold text-[#f1f5f9]">All Clear</p>
          <p class="text-sm text-[#94a3b8] mt-1">No active alerts. All systems nominal.</p>
        </div>
      </template>

      <template x-if="powerByHost.length > 0 || portsByHost.length > 0 || healthAlertCount > 0">
        <div>
          <!-- CARDS VIEW: Three columns -->
          <div x-show="alertView === 'cards'" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Power Alerts: -30 and below = CRITICAL, rest = WARNING -->
            <div class="mission-card bg-[#1a2236] rounded-xl border border-[rgba(255,255,255,0.08)] overflow-hidden">
              <div class="px-5 py-4 border-b border-[rgba(255,255,255,0.08)] flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#ef4444]"></span>
                <h2 class="text-sm font-semibold text-[#f1f5f9]">Power</h2>
                <span class="ml-auto text-xs font-mono text-[#94a3b8]" x-text="powerByHost.length + ' hosts'"></span>
              </div>
              <div class="max-h-[420px] overflow-y-auto p-3 space-y-2">
                <template x-if="powerByHost.length === 0">
                  <p class="text-sm text-[#94a3b8] py-4 text-center">No weak power alerts.</p>
                </template>
                <template x-for="h in powerByHost" :key="h.host">
                  <a :href="'/dashboard?tab=powers&device=' + encodeURIComponent(h.device)"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg bg-[#111827] hover:bg-[#1a2236] transition-colors group cursor-pointer"
                    :class="(h.worstRx <= -30 ? 'border-l-4 border-[#ef4444]' : 'border-l-4 border-[#f59e0b]') + (h.worstRx <= -30 ? ' pulse-critical' : '')">
                    <span class="inline-flex items-center gap-1.5 px-2 py-0.5 text-xs font-medium rounded-full"
                      :class="h.worstRx <= -30 ? 'bg-[#ef4444]/20 text-[#ef4444]' : 'bg-[#f59e0b]/20 text-[#f59e0b]'">
                      <span class="w-1.5 h-1.5 rounded-full" :class="h.worstRx <= -30 ? 'bg-[#ef4444]' : 'bg-[#f59e0b]'"></span>
                      <span x-text="h.worstRx <= -30 ? 'CRITICAL' : 'WARNING'"></span>
                    </span>
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-medium truncate text-[#f1f5f9]" x-text="h.device"></p>
                      <p class="text-xs text-[#94a3b8] truncate" x-text="h.site + ' \u00B7 ' + h.host + (h.worstRx ? ' \u00B7 ' + h.worstRx.toFixed(1) + ' dBm' : '')"></p>
                    </div>
                    <span class="text-lg font-bold font-mono" :class="h.worstRx <= -30 ? 'text-[#ef4444]' : 'text-[#f59e0b]'" x-text="h.count"></span>
                    <svg class="w-4 h-4 text-[#475569] group-hover:text-[#3b82f6] transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                  </a>
                </template>
              </div>
            </div>

            <!-- Port Alerts: act-down = CRITICAL, inact only = WARNING -->
            <div class="mission-card bg-[#1a2236] rounded-xl border border-[rgba(255,255,255,0.08)] overflow-hidden">
              <div class="px-5 py-4 border-b border-[rgba(255,255,255,0.08)] flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#f59e0b]"></span>
                <h2 class="text-sm font-semibold text-[#f1f5f9]">Ports</h2>
                <span class="ml-auto text-xs font-mono text-[#94a3b8]" x-text="portsByHost.length + ' hosts'"></span>
              </div>
              <div class="max-h-[420px] overflow-y-auto p-3 space-y-2">
                <template x-if="portsByHost.length === 0">
                  <p class="text-sm text-[#94a3b8] py-4 text-center">No down port alerts.</p>
                </template>
                <template x-for="h in portsByHost" :key="h.host">
                  <a :href="'/dashboard?tab=ports&device=' + encodeURIComponent(h.device)"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg bg-[#111827] hover:bg-[#1a2236] transition-colors group cursor-pointer"
                    :class="(h.actDownCount > 0 ? 'border-l-4 border-[#ef4444]' : 'border-l-4 border-[#f59e0b]') + (h.actDownCount > 0 ? ' pulse-critical' : '')">
                    <span class="inline-flex items-center gap-1.5 px-2 py-0.5 text-xs font-medium rounded-full"
                      :class="h.actDownCount > 0 ? 'bg-[#ef4444]/20 text-[#ef4444]' : 'bg-[#f59e0b]/20 text-[#f59e0b]'">
                      <span class="w-1.5 h-1.5 rounded-full" :class="h.actDownCount > 0 ? 'bg-[#ef4444]' : 'bg-[#f59e0b]'"></span>
                      <span x-text="h.actDownCount > 0 ? 'CRITICAL' : 'WARNING'"></span>
                    </span>
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-medium truncate text-[#f1f5f9]" x-text="h.device"></p>
                      <p class="text-xs text-[#94a3b8] truncate" x-text="h.site + ' \u00B7 ' + h.host"></p>
                    </div>
                    <span class="text-lg font-bold font-mono" :class="h.actDownCount > 0 ? 'text-[#ef4444]' : 'text-[#f59e0b]'" x-text="h.count"></span>
                    <svg class="w-4 h-4 text-[#475569] group-hover:text-[#3b82f6] transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                  </a>
                </template>
              </div>
            </div>

            <!-- Health Status -->
            <div class="mission-card bg-[#1a2236] rounded-xl border border-[rgba(255,255,255,0.08)] overflow-hidden">
              <div class="px-5 py-4 border-b border-[rgba(255,255,255,0.08)] flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#10b981]"></span>
                <h2 class="text-sm font-semibold text-[#f1f5f9]">Health</h2>
                <span class="ml-auto text-xs font-mono text-[#94a3b8]" x-text="healthAlertCount + ' / ' + healthSummary.length"></span>
              </div>
              <div class="max-h-[420px] overflow-y-auto p-3 space-y-2">
                <template x-if="healthSummary.length === 0">
                  <p class="text-sm text-[#94a3b8] py-4 text-center">No health data yet.</p>
                </template>
                <template x-for="olt in (showAllHealth ? healthSummary : healthSummary.slice(0, 10))" :key="olt.host">
                  <a :href="'/dashboard?tab=health&host=' + encodeURIComponent(olt.host)"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg bg-[#111827] hover:bg-[#1a2236] transition-colors group cursor-pointer"
                    :class="{
                      'border-l-4 border-[#ef4444] pulse-critical': olt.status === 'CRITICAL',
                      'border-l-4 border-[#f59e0b]': olt.status === 'WARNING',
                      'border-l-4 border-[#10b981]': olt.status === 'NORMAL'
                    }">
                    <span class="inline-flex items-center gap-1.5 px-2 py-0.5 text-xs font-medium rounded-full"
                      :class="{
                        'bg-[#ef4444]/20 text-[#ef4444]': olt.status === 'CRITICAL',
                        'bg-[#f59e0b]/20 text-[#f59e0b]': olt.status === 'WARNING',
                        'bg-[#10b981]/20 text-[#10b981]': olt.status === 'NORMAL'
                      }">
                      <span class="w-1.5 h-1.5 rounded-full"
                        :class="olt.status === 'CRITICAL' ? 'bg-[#ef4444]' : olt.status === 'WARNING' ? 'bg-[#f59e0b]' : 'bg-[#10b981]'"></span>
                      <span x-text="olt.status"></span>
                    </span>
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-medium truncate text-[#f1f5f9]" x-text="olt.device"></p>
                      <p class="text-xs text-[#94a3b8] truncate" x-text="olt.site + ' \u00B7 ' + olt.host"></p>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                      <span class="text-xs font-mono px-2 py-0.5 rounded" :class="olt.cpu > 80 ? 'bg-[#ef4444]/20 text-[#ef4444]' : olt.cpu > 60 ? 'bg-[#f59e0b]/20 text-[#f59e0b]' : 'bg-[#475569]/30 text-[#94a3b8]'" x-text="olt.cpu + '%'"></span>
                      <span class="text-xs font-mono px-2 py-0.5 rounded" :class="olt.temp > 65 ? 'bg-[#ef4444]/20 text-[#ef4444]' : olt.temp > 55 ? 'bg-[#f59e0b]/20 text-[#f59e0b]' : 'bg-[#475569]/30 text-[#94a3b8]'" x-text="olt.temp + '\u00B0'"></span>
                    </div>
                    <svg class="w-4 h-4 text-[#475569] group-hover:text-[#3b82f6] transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                  </a>
                </template>
                <template x-if="healthSummary.length > 10">
                  <button @click="showAllHealth = !showAllHealth" class="w-full py-2 text-sm text-[#3b82f6] hover:text-[#60a5fa]" x-text="showAllHealth ? 'Show less' : 'Show all ' + healthSummary.length + ' OLTs'"></button>
                </template>
              </div>
            </div>
          </div>

          <!-- LIST VIEW: Unified feed sorted by severity -->
          <div x-show="alertView === 'list'" class="space-y-2">
            <div class="mission-card bg-[#1a2236] rounded-xl border border-[rgba(255,255,255,0.08)] overflow-hidden">
              <div class="px-5 py-4 border-b border-[rgba(255,255,255,0.08)]">
                <h2 class="text-sm font-semibold text-[#f1f5f9]">Alert Feed</h2>
                <p class="text-xs text-[#94a3b8] mt-0.5">All alerts in one list, sorted by severity</p>
              </div>
              <div class="max-h-[540px] overflow-y-auto divide-y divide-[rgba(255,255,255,0.06)]">
                <template x-for="a in alertFeed" :key="a.type + '-' + a.host">
                  <a :href="a.link"
                    class="flex items-center gap-4 px-5 py-3 hover:bg-[#111827] transition-colors group cursor-pointer"
                    :class="{
                      'border-l-4 border-[#ef4444]': a.severity === 'CRITICAL',
                      'border-l-4 border-[#f59e0b]': a.severity === 'WARNING',
                      'border-l-4 border-[#10b981]': a.severity === 'NORMAL',
                      'pulse-critical': a.severity === 'CRITICAL'
                    }">
                    <span class="inline-flex items-center gap-1.5 px-2 py-0.5 text-xs font-medium rounded-full shrink-0"
                      :class="{
                        'bg-[#ef4444]/20 text-[#ef4444]': a.severity === 'CRITICAL',
                        'bg-[#f59e0b]/20 text-[#f59e0b]': a.severity === 'WARNING',
                        'bg-[#10b981]/20 text-[#10b981]': a.severity === 'NORMAL'
                      }">
                      <span class="w-1.5 h-1.5 rounded-full" :class="a.severity === 'CRITICAL' ? 'bg-[#ef4444]' : a.severity === 'WARNING' ? 'bg-[#f59e0b]' : 'bg-[#10b981]'"></span>
                      <span x-text="a.severity"></span>
                    </span>
                    <span class="text-[10px] font-medium uppercase tracking-wider text-[#475569] shrink-0 w-16" x-text="a.type"></span>
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-medium truncate text-[#f1f5f9]" x-text="a.device"></p>
                      <p class="text-xs text-[#94a3b8] truncate" x-text="a.site + ' \u00B7 ' + a.host"></p>
                    </div>
                    <span class="text-sm font-mono font-bold shrink-0" :class="a.severity === 'CRITICAL' ? 'text-[#ef4444]' : a.severity === 'WARNING' ? 'text-[#f59e0b]' : 'text-[#10b981]'" x-text="a.detail"></span>
                    <svg class="w-4 h-4 text-[#475569] group-hover:text-[#3b82f6] shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                  </a>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>

<style>
  @keyframes checkDraw {
    from { stroke-dashoffset: 50; opacity: 0.5; }
    to { stroke-dashoffset: 0; opacity: 1; }
  }
</style>

<script>
  function alertsPage() {
    return {
      loading: true,
      weakPowers: [],
      downPorts: [],
      healthData: [],
      showAllHealth: false,
      alertView: 'cards',

      async init() {
        await this.loadData();
        window.addEventListener('vendor-changed', () => { this.loading = true; this.loadData(); });
      },
      async loadData() {
        var vp = vendorParam();
        var [pRes, portRes, hRes] = await Promise.all([
          fetch('/api/power/weak?' + vp),
          fetch('/api/ports/down?' + vp),
          fetch('/api/health?' + vp)
        ]);
        this.weakPowers = (await pRes.json()) || [];
        this.downPorts = (await portRes.json()) || [];
        this.healthData = (await hRes.json()) || [];
        this.loading = false;
      },

      // Power: worstRx <= -30 = CRITICAL, else WARNING
      get powerByHost() {
        var map = {};
        this.weakPowers.forEach(function(a) {
          var key = a.host;
          if (!map[key]) map[key] = { device: a.device, site: a.site, host: a.host, count: 0, worstRx: 0 };
          map[key].count++;
          if ((a.olt_rx || 0) < (map[key].worstRx || 0)) map[key].worstRx = a.olt_rx;
        });
        return Object.values(map).sort(function(a, b) { return b.count - a.count; });
      },

      // Ports: act-down = CRITICAL, inact only = WARNING
      get portsByHost() {
        var map = {};
        this.downPorts.forEach(function(p) {
          var key = p.host;
          if (!map[key]) map[key] = { device: p.device, site: p.site, host: p.host, count: 0, actDownCount: 0 };
          map[key].count++;
          if (p.port_state === 'act-down' || p.paired_state === 'act-down') map[key].actDownCount++;
        });
        return Object.values(map).sort(function(a, b) { return b.count - a.count; });
      },

      get healthSummary() {
        var sev = function(cpu, temp) { return (cpu > 80 || temp > 65) ? 'CRITICAL' : (cpu > 60 || temp > 55) ? 'WARNING' : 'NORMAL'; };
        var order = { CRITICAL: 0, WARNING: 1, NORMAL: 2 };
        return this.healthData.map(function(h) {
          var cpuMax = (h.cpu_loads || []).reduce(function(max, c) {
            return (c.average_pct || 0) > max.val ? { val: c.average_pct, slot: c.slot } : max;
          }, { val: 0, slot: '-' });
          var tempMax = (h.temperatures || []).reduce(function(max, t) {
            return (t.act_temp || 0) > max.val ? { val: t.act_temp, slot: t.slot } : max;
          }, { val: 0, slot: '-' });
          return {
            device: h.device, site: h.site, host: h.host,
            cpu: cpuMax.val, cpuSlot: cpuMax.slot,
            temp: tempMax.val, tempSlot: tempMax.slot,
            status: sev(cpuMax.val, tempMax.val)
          };
        }).sort(function(a, b) { return (order[a.status] || 2) - (order[b.status] || 2); });
      },

      get healthAlertCount() {
        return this.healthSummary.filter(function(o) { return o.status !== 'NORMAL'; }).length;
      },

      // Unified feed for List view: Critical first, then Warning, then Normal
      get alertFeed() {
        var feed = [];
        var self = this;
        this.powerByHost.forEach(function(h) {
          feed.push({
            type: 'Power',
            severity: (h.worstRx || 0) <= -30 ? 'CRITICAL' : 'WARNING',
            device: h.device, site: h.site, host: h.host,
            detail: h.count + ' weak',
            link: '/dashboard?tab=powers&device=' + encodeURIComponent(h.device)
          });
        });
        this.portsByHost.forEach(function(h) {
          feed.push({
            type: 'Port',
            severity: h.actDownCount > 0 ? 'CRITICAL' : 'WARNING',
            device: h.device, site: h.site, host: h.host,
            detail: h.count + ' down',
            link: '/dashboard?tab=ports&device=' + encodeURIComponent(h.device)
          });
        });
        this.healthSummary.forEach(function(o) {
          if (o.status !== 'NORMAL') {
            feed.push({
              type: 'Health',
              severity: o.status,
              device: o.device, site: o.site, host: o.host,
              detail: o.cpu + '% / ' + o.temp + '\u00B0',
              link: '/dashboard?tab=health&host=' + encodeURIComponent(o.host)
            });
          }
        });
        var order = { CRITICAL: 0, WARNING: 1, NORMAL: 2 };
        feed.sort(function(a, b) {
          var diff = (order[a.severity] || 2) - (order[b.severity] || 2);
          if (diff !== 0) return diff;
          return (a.device || '').localeCompare(b.device || '');
        });
        return feed;
      }
    };
  }
</script>
{{end}}
