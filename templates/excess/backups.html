{{define "content"}}
<div x-data="backupsPage()" x-init="init()">
  <h1 class="text-2xl font-bold text-[#f1f5f9] mb-6">Backups</h1>

  <!-- Loading: skeleton -->
  <template x-if="loading">
    <div class="space-y-4 py-6">
      <div class="h-12 w-full max-w-md rounded-xl bg-[#1a2236] animate-pulse"></div>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div class="h-32 rounded-xl bg-[#1a2236] animate-pulse"></div>
        <div class="h-32 rounded-xl bg-[#1a2236] animate-pulse"></div>
        <div class="h-32 rounded-xl bg-[#1a2236] animate-pulse"></div>
        <div class="h-32 rounded-xl bg-[#1a2236] animate-pulse"></div>
      </div>
    </div>
  </template>

  <template x-if="!loading">
    <div>
      <template x-if="backups.length === 0">
        <p class="text-[#94a3b8] text-center py-10">No backups available.</p>
      </template>

      <template x-if="backups.length > 0">
        <div>
          <!-- Breadcrumb -->
          <div class="flex items-center gap-2 mb-4 text-sm">
            <button @click="currentSite = ''; currentDate = ''"
              class="flex items-center gap-1.5 hover:text-[#3b82f6] transition-colors"
              :class="!currentSite ? 'text-[#f1f5f9] font-semibold' : 'text-[#3b82f6]'">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
              Backups
            </button>
            <template x-if="currentSite">
              <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-[#475569]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                <button @click="currentDate = ''"
                  class="hover:text-[#3b82f6] transition-colors"
                  :class="!currentDate ? 'text-[#f1f5f9] font-semibold' : 'text-[#3b82f6]'"
                  x-text="currentSite">
                </button>
              </div>
            </template>
            <template x-if="currentDate">
              <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-[#475569]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                <span class="text-[#f1f5f9] font-semibold" x-text="currentDate"></span>
              </div>
            </template>
          </div>

          <!-- Site folders (root level) with badge on count -->
          <div x-show="!currentSite">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
              <template x-for="site in sites" :key="site.name">
                <button @click="currentSite = site.name"
                  class="group mission-card relative flex flex-col items-center gap-2 p-5 rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#1a2236] hover:border-[#3b82f6]/40 transition-all">
                  <span class="absolute top-2 right-2 min-w-[22px] h-5 px-2 flex items-center justify-center text-[10px] font-mono font-bold rounded-md bg-[#3b82f6] text-white" x-text="site.count"></span>
                  <svg class="w-14 h-14 text-[#f59e0b] group-hover:text-[#f59e0b]/80 transition-colors" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
                  </svg>
                  <span class="text-sm font-medium text-[#f1f5f9] text-center truncate w-full" x-text="site.name"></span>
                  <span class="text-[10px] text-[#94a3b8]" x-text="site.count + ' files'"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Date folders (inside a site) with badge on count -->
          <div x-show="currentSite && !currentDate">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
              <template x-for="d in datesForSite" :key="d.date">
                <button @click="currentDate = d.date"
                  class="group mission-card relative flex flex-col items-center gap-2 p-5 rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#1a2236] hover:border-[#3b82f6]/40 transition-all">
                  <span class="absolute top-2 right-2 min-w-[22px] h-5 px-2 flex items-center justify-center text-[10px] font-mono font-bold rounded-md bg-[#3b82f6] text-white" x-text="d.count"></span>
                  <svg class="w-14 h-14 text-[#3b82f6] group-hover:text-[#3b82f6]/80 transition-colors" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
                  </svg>
                  <span class="text-sm font-medium text-[#f1f5f9]" x-text="d.date"></span>
                  <span class="text-[10px] text-[#94a3b8]" x-text="d.count + ' files'"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Files (inside a date folder): file size, Copy Path, Download -->
          <div x-show="currentSite && currentDate">
            <div class="space-y-2">
              <template x-for="b in filesForDate" :key="b.ID">
                <div class="mission-card flex items-center gap-4 px-4 py-3 bg-[#1a2236] rounded-xl border border-[rgba(255,255,255,0.08)] hover:border-[#3b82f6]/40 transition-all">
                  <svg class="w-8 h-8 flex-shrink-0 text-[#94a3b8]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                  </svg>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-[#f1f5f9] truncate" x-text="b.device"></p>
                    <p class="text-xs text-[#94a3b8] font-mono truncate" x-text="b.host"></p>
                  </div>
                  <span class="text-xs text-[#475569] font-mono flex-shrink-0" x-text="formatSize(b.file_size)"></span>
                  <div class="text-right text-xs text-[#94a3b8] flex-shrink-0">
                    <p x-text="new Date(b.CreatedAt).toLocaleTimeString()"></p>
                  </div>
                  <button @click="copyPath(b, $event)" class="flex-shrink-0 inline-flex items-center gap-1 px-2 py-1.5 text-xs font-medium rounded-lg border border-[rgba(255,255,255,0.08)] text-[#94a3b8] hover:bg-white/5 hover:text-[#f1f5f9] transition-colors active:scale-[0.98]" title="Copy path">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg>
                    Copy Path
                  </button>
                  <a :href="'/api/backups/' + b.ID + '/download'"
                    class="flex-shrink-0 inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg bg-[#3b82f6]/20 text-[#3b82f6] hover:bg-[#3b82f6]/30 transition-colors active:scale-[0.98]">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                    Download
                  </a>
                </div>
              </template>
            </div>
          </div>

          <!-- Summary bar -->
          <div class="mt-6 text-sm text-[#94a3b8] flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
            <span x-text="backups.length + ' total backup files across ' + sites.length + ' sites'"></span>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>

<script>
function backupsPage() {
  return {
    backups: [],
    loading: true,
    currentSite: '',
    currentDate: '',

    async init() {
      const res = await fetch('/api/backups');
      this.backups = await res.json() || [];
      this.loading = false;
    },

    formatSize(bytes) {
      if (!bytes || bytes === 0) return '—';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + (sizes[i] || 'B');
    },

    copyPath(b, ev) {
      const path = b.file_path || (b.site || '') + '/' + (b.device || '') + ' @ ' + (b.host || '');
      navigator.clipboard.writeText(path).then(() => {
        const btn = ev && ev.target ? ev.target.closest('button') : null;
        if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg> Copy Path'; }, 1500); }
      });
    },

    get sites() {
      const map = {};
      this.backups.forEach(b => {
        if (!map[b.site]) map[b.site] = 0;
        map[b.site]++;
      });
      return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([name, count]) => ({ name, count }));
    },

    get datesForSite() {
      const map = {};
      this.backups.filter(b => b.site === this.currentSite).forEach(b => {
        const date = new Date(b.CreatedAt).toISOString().split('T')[0];
        if (!map[date]) map[date] = 0;
        map[date]++;
      });
      return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0])).map(([date, count]) => ({ date, count }));
    },

    get filesForDate() {
      return this.backups.filter(b => {
        if (b.site !== this.currentSite) return false;
        const date = new Date(b.CreatedAt).toISOString().split('T')[0];
        return date === this.currentDate;
      });
    }
  }
}
</script>
{{end}}
