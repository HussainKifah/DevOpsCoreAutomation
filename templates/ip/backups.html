{{define "content"}}
<div x-data="ipBackupsPage()" x-init="init()">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-[#f1f5f9]">IP Team Backups</h1>
      <p class="text-sm text-[#94a3b8] mt-0.5">Configuration backups collected from BNG devices</p>
    </div>
    <div class="flex items-center gap-2 text-sm text-[#94a3b8]">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4"/></svg>
      <span x-text="totalFiles + ' files'"></span>
    </div>
  </div>

  <!-- Loading -->
  <template x-if="loading">
    <div class="space-y-4 py-6">
      <div class="flex gap-2">
        <div class="h-8 w-24 rounded-lg bg-[#1a2236] animate-pulse"></div>
        <div class="h-8 w-24 rounded-lg bg-[#1a2236] animate-pulse"></div>
        <div class="h-8 w-24 rounded-lg bg-[#1a2236] animate-pulse"></div>
      </div>
      <div class="h-64 rounded-xl bg-[#1a2236] animate-pulse"></div>
    </div>
  </template>

  <template x-if="!loading">
    <div>
      <!-- empty state -->
      <template x-if="runs.length === 0">
        <div class="flex flex-col items-center justify-center py-20 text-center rounded-xl bg-[#1a2236] border border-[rgba(255,255,255,0.08)]">
          <svg class="w-14 h-14 text-[#475569] mb-4 opacity-40" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4"/></svg>
          <p class="text-[#f1f5f9] font-medium">No backups yet</p>
          <p class="text-sm text-[#94a3b8] mt-1">Run a backup job from the Workflows page to see files here.</p>
        </div>
      </template>

      <template x-if="runs.length > 0">
        <div>
          <!-- Breadcrumb nav -->
          <div class="flex items-center gap-2 mb-5 text-sm flex-wrap">
            <button @click="drillVendor = ''; drillDate = ''; drillDevice = ''"
              :class="!drillVendor ? 'text-[#f1f5f9] font-semibold' : 'text-[#3b82f6] hover:underline'"
              class="flex items-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
              Backups
            </button>
            <template x-if="drillVendor">
              <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-[#475569]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                <button @click="drillDate = ''; drillDevice = ''"
                  :class="!drillDate ? 'text-[#f1f5f9] font-semibold' : 'text-[#3b82f6] hover:underline'"
                  class="capitalize" x-text="drillVendor"></button>
              </div>
            </template>
            <template x-if="drillDate">
              <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-[#475569]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                <button @click="drillDevice = ''"
                  :class="!drillDevice ? 'text-[#f1f5f9] font-semibold' : 'text-[#3b82f6] hover:underline'"
                  x-text="drillDate"></button>
              </div>
            </template>
            <template x-if="drillDevice">
              <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-[#475569]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                <span class="text-[#f1f5f9] font-semibold" x-text="drillDevice"></span>
              </div>
            </template>
          </div>

          <!-- LEVEL 0: Vendor folders -->
          <div x-show="!drillVendor">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
              <template x-for="v in vendorGroups" :key="v.vendor">
                <button @click="drillVendor = v.vendor"
                  class="group mission-card relative flex flex-col items-center gap-3 p-5 rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#1a2236] hover:border-[#3b82f6]/40 transition-all">
                  <span class="absolute top-2 right-2 min-w-[22px] h-5 px-2 flex items-center justify-center text-[10px] font-mono font-bold rounded-md text-white"
                    :class="{
                      'bg-[#3b82f6]': v.vendor === 'nokia',
                      'bg-[#10b981]': v.vendor === 'cisco',
                      'bg-[#f59e0b]': v.vendor === 'mikrotik'
                    }"
                    x-text="v.count"></span>
                  <!-- vendor icon -->
                  <div class="w-14 h-14 rounded-xl flex items-center justify-center text-2xl font-bold"
                    :class="{
                      'bg-[#3b82f6]/15 text-[#3b82f6]': v.vendor === 'nokia',
                      'bg-[#10b981]/15 text-[#10b981]': v.vendor === 'cisco',
                      'bg-[#f59e0b]/15 text-[#f59e0b]': v.vendor === 'mikrotik'
                    }">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3"/></svg>
                  </div>
                  <span class="text-sm font-semibold text-[#f1f5f9] capitalize" x-text="v.vendor"></span>
                  <span class="text-[10px] text-[#94a3b8]" x-text="v.count + ' files'"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- LEVEL 1: Date folders for selected vendor -->
          <div x-show="drillVendor && !drillDate">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
              <template x-for="d in datesForVendor" :key="d.date">
                <button @click="drillDate = d.date"
                  class="group mission-card relative flex flex-col items-center gap-2 p-5 rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#1a2236] hover:border-[#3b82f6]/40 transition-all">
                  <span class="absolute top-2 right-2 min-w-[22px] h-5 px-2 flex items-center justify-center text-[10px] font-mono font-bold rounded-md bg-[#3b82f6] text-white" x-text="d.count"></span>
                  <svg class="w-14 h-14 text-[#3b82f6]" fill="currentColor" viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                  <span class="text-sm font-medium text-[#f1f5f9]" x-text="d.date"></span>
                  <span class="text-[10px] text-[#94a3b8]" x-text="d.count + ' files'"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- LEVEL 2: Device folders for selected date -->
          <div x-show="drillVendor && drillDate && !drillDevice">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
              <template x-for="d in devicesForDate" :key="d.device">
                <button @click="drillDevice = d.device"
                  class="group mission-card relative flex flex-col items-center gap-2 p-5 rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#1a2236] hover:border-[#3b82f6]/40 transition-all">
                  <span class="absolute top-2 right-2 min-w-[22px] h-5 px-2 flex items-center justify-center text-[10px] font-mono font-bold rounded-md bg-[#10b981] text-white" x-text="d.count"></span>
                  <svg class="w-14 h-14 text-[#94a3b8]" fill="currentColor" viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                  <span class="text-sm font-medium text-[#f1f5f9] text-center truncate w-full" x-text="d.device"></span>
                  <span class="text-[10px] text-[#94a3b8]" x-text="d.count + ' file' + (d.count !== 1 ? 's' : '')"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- LEVEL 3: File list -->
          <div x-show="drillVendor && drillDate && drillDevice">
            <div class="space-y-2">
              <template x-for="r in filesForDevice" :key="r.id">
                <div class="mission-card flex items-center gap-4 px-4 py-3.5 bg-[#1a2236] rounded-xl border border-[rgba(255,255,255,0.08)] hover:border-[#3b82f6]/30 transition-all">
                  <svg class="w-8 h-8 flex-shrink-0 text-[#94a3b8]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>

                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-[#f1f5f9] truncate" x-text="r.device_name"></p>
                    <p class="text-xs font-mono text-[#94a3b8] truncate" x-text="r.host"></p>
                  </div>

                  <!-- time badge -->
                  <div class="text-right shrink-0">
                    <p class="text-xs text-[#f1f5f9]" x-text="new Date(r.started_at).toLocaleTimeString()"></p>
                    <p class="text-[10px] text-[#475569]" x-text="new Date(r.started_at).toLocaleDateString()"></p>
                  </div>

                  <!-- output size -->
                  <span class="text-xs font-mono text-[#475569] shrink-0 w-16 text-right" x-text="formatBytes(r.output_size)"></span>

                  <!-- status -->
                  <span class="inline-flex items-center gap-1 px-2 py-1 text-xs rounded-full shrink-0"
                    :class="r.status === 'ok' ? 'bg-[#10b981]/20 text-[#10b981]' : 'bg-[#ef4444]/20 text-[#ef4444]'">
                    <span class="w-1.5 h-1.5 rounded-full" :class="r.status === 'ok' ? 'bg-[#10b981]' : 'bg-[#ef4444]'"></span>
                    <span x-text="r.status === 'ok' ? 'OK' : 'Failed'"></span>
                  </span>

                  <!-- actions -->
                  <div class="flex items-center gap-2 shrink-0">
                    <button @click="previewRun(r)" class="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs rounded-lg border border-[rgba(255,255,255,0.08)] text-[#94a3b8] hover:text-[#f1f5f9] hover:bg-white/5 transition-colors">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                      View
                    </button>
                    <button @click="downloadRun(r)" class="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs rounded-lg bg-[#3b82f6]/20 text-[#3b82f6] hover:bg-[#3b82f6]/30 transition-colors">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                      Download
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!-- ════════ Preview Modal ════════ -->
  <div x-show="showPreview" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="fixed inset-0 bg-black/70 backdrop-blur-sm" @click="showPreview = false"></div>
    <div class="relative bg-[#0a0e1a] rounded-2xl border border-[rgba(255,255,255,0.08)] w-full max-w-4xl mx-4 shadow-2xl flex flex-col max-h-[85vh]">
      <div class="flex items-center justify-between px-5 py-4 border-b border-[rgba(255,255,255,0.08)]">
        <div>
          <p class="text-sm font-semibold text-[#f1f5f9]" x-text="previewRun_?.device_name || ''"></p>
          <p class="text-xs text-[#94a3b8] font-mono" x-text="previewRun_?.host + ' · ' + (previewRun_ ? new Date(previewRun_.started_at).toLocaleString() : '')"></p>
        </div>
        <div class="flex items-center gap-2">
          <button @click="copyOutput()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs rounded-lg border border-[rgba(255,255,255,0.08)] text-[#94a3b8] hover:text-[#f1f5f9] hover:bg-white/5 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg>
            <span x-text="copied ? 'Copied!' : 'Copy'"></span>
          </button>
          <button @click="showPreview = false" class="p-1.5 rounded-lg hover:bg-white/5 text-[#94a3b8] transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-5">
        <pre class="text-xs text-[#94a3b8] font-mono whitespace-pre-wrap leading-relaxed" x-text="previewOutput"></pre>
      </div>
    </div>
  </div>

</div>

<script>
function ipBackupsPage() {
  return {
    loading: true,
    runs: [],
    drillVendor: '',
    drillDate: '',
    drillDevice: '',
    showPreview: false,
    previewRun_: null,
    previewOutput: '',
    copied: false,

    async init() {
      await this.fetchRuns();
      this.loading = false;
    },

    async fetchRuns() {
      // Fetch all backup job runs (job_type=backup, status=ok)
      const res = await fetch('/api/workflows/runs?type=backup');
      const data = await res.json();
      this.runs = data || [];
    },

    get totalFiles() {
      return this.runs.length;
    },

    formatBytes(n) {
      if (!n) return '—';
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / (1024 * 1024)).toFixed(1) + ' MB';
    },

    get vendorGroups() {
      const map = {};
      this.runs.forEach(r => {
        const v = r.vendor || 'unknown';
        if (!map[v]) map[v] = 0;
        map[v]++;
      });
      return Object.entries(map)
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([vendor, count]) => ({ vendor, count }));
    },

    get datesForVendor() {
      const map = {};
      this.runs.filter(r => r.vendor === this.drillVendor).forEach(r => {
        const date = r.started_at ? r.started_at.slice(0, 10) : '?';
        if (!map[date]) map[date] = 0;
        map[date]++;
      });
      return Object.entries(map)
        .sort((a, b) => b[0].localeCompare(a[0]))
        .map(([date, count]) => ({ date, count }));
    },

    get devicesForDate() {
      const map = {};
      this.runs
        .filter(r => r.vendor === this.drillVendor && r.started_at?.slice(0, 10) === this.drillDate)
        .forEach(r => {
          const key = r.device_name || r.host;
          if (!map[key]) map[key] = 0;
          map[key]++;
        });
      return Object.entries(map)
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([device, count]) => ({ device, count }));
    },

    get filesForDevice() {
      return this.runs.filter(r =>
        r.vendor === this.drillVendor &&
        r.started_at?.slice(0, 10) === this.drillDate &&
        (r.device_name || r.host) === this.drillDevice
      ).sort((a, b) => new Date(b.started_at) - new Date(a.started_at));
    },

    async previewRun(r) {
      this.previewRun_ = r;
      this.previewOutput = '';
      this.showPreview = true;
      // Fetch full output for this run
      const res = await fetch('/api/workflows/runs/' + r.id + '/output');
      const data = await res.json();
      this.previewOutput = data.output || '(no output)';
    },

    copyOutput() {
      navigator.clipboard.writeText(this.previewOutput).then(() => {
        this.copied = true;
        setTimeout(() => { this.copied = false; }, 2000);
      });
    },

    async downloadRun(r) {
      try {
        const res = await fetch('/api/workflows/runs/' + r.id + '/output');
        const data = await res.json();
        const blob = new Blob([data.output || ''], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = (r.device_name || r.host) + '_' + (r.started_at || '').slice(0, 10) + '.txt';
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) { alert('Failed to download backup'); }
    },
  };
}
</script>
{{end}}
