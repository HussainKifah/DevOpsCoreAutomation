{{define "content"}}
<div x-data="ipCapacitiesPage()" x-init="init()" class="max-w-7xl mx-auto">
  <div class="mb-6 flex items-start justify-between gap-4 flex-wrap">
    <div>
      <h1 class="text-2xl font-bold text-[#f1f5f9]">Capacities Update</h1>
    </div>
    <div class="flex items-center gap-2">
      <input x-ref="importFile" type="file" accept=".xlsx,.xls,.csv" class="hidden" @change="importExcel($event)">
      <button type="button" @click="$refs.importFile.click()" :disabled="importing" class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-semibold btn-press" x-text="importing ? 'Importing...' : 'Import Excel'"></button>
      <button type="button" @click="openNodeModal()" class="px-4 py-2 rounded-lg bg-teal-600 hover:bg-teal-500 text-white text-sm font-semibold btn-press">Add Capacity</button>
      <button type="button" @click="openActionModal()" class="px-4 py-2 rounded-lg bg-[#334155] hover:bg-[#475569] text-white text-sm font-semibold btn-press">Add Action</button>
    </div>
  </div>

  <div class="flex gap-1 p-1 rounded-xl bg-[#1a2236] border border-[rgba(255,255,255,0.08)] w-fit mb-6">
    <button type="button" @click="setTab('review')" class="px-4 py-2 text-sm font-semibold rounded-lg transition-colors" :class="tab === 'review' ? 'bg-teal-500/20 text-teal-300' : 'text-[#94a3b8] hover:text-[#f1f5f9]'">Review</button>
    <button type="button" @click="setTab('actions')" class="px-4 py-2 text-sm font-semibold rounded-lg transition-colors" :class="tab === 'actions' ? 'bg-teal-500/20 text-teal-300' : 'text-[#94a3b8] hover:text-[#f1f5f9]'">Actions</button>
    <button type="button" @click="setTab('history')" class="px-4 py-2 text-sm font-semibold rounded-lg transition-colors" :class="tab === 'history' ? 'bg-teal-500/20 text-teal-300' : 'text-[#94a3b8] hover:text-[#f1f5f9]'">History</button>
  </div>

  <p class="mb-4 text-sm text-red-400" x-show="error" x-text="error"></p>

  <div x-show="tab === 'review'" x-cloak class="space-y-4">
    <div class="flex items-center gap-3 flex-wrap">
      <div class="flex items-center gap-2 flex-wrap">
        <select x-model.number="selectedNodeDeleteId" class="min-w-[240px] rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] px-3 py-2 text-sm text-[#f1f5f9] focus:outline-none focus:border-red-500/50">
          <option value="0">Select row to delete</option>
          <template x-for="node in nodes" :key="'delete-node-' + node.id">
            <option :value="node.id" x-text="nodeLabel(node)"></option>
          </template>
        </select>
        <button type="button" @click="deleteSelectedNode()" :disabled="!selectedNodeDeleteId" class="px-3 py-2 rounded-lg border border-red-500/30 bg-red-500/10 text-sm font-semibold text-red-300 hover:bg-red-500/20 disabled:opacity-40 disabled:cursor-not-allowed">Delete Row</button>
      </div>
      <div class="relative flex-1 min-w-[240px] max-w-md">
        <input x-model.debounce.350ms="search" @input="loadNodes()" type="search" placeholder="Search province, node, type, or capacity" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] px-3 py-2 text-sm text-[#f1f5f9] placeholder-[#64748b] focus:outline-none focus:border-teal-500/50">
      </div>
      <button type="button" @click="refreshAll()" class="px-3 py-2 rounded-lg border border-[rgba(255,255,255,0.08)] text-sm text-[#94a3b8] hover:text-[#f1f5f9] hover:border-teal-500/40">Refresh</button>
    </div>

    <div class="overflow-x-auto rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#111827]">
      <table class="min-w-full divide-y divide-[rgba(255,255,255,0.08)]">
        <thead class="bg-[#1a2236]">
          <tr class="text-left text-xs uppercase tracking-wide text-[#94a3b8]">
            <th class="px-4 py-3 font-semibold">Province</th>
            <th class="px-4 py-3 font-semibold">Name</th>
            <th class="px-4 py-3 font-semibold">Type</th>
            <th class="px-4 py-3 font-semibold">Before Update</th>
            <th class="px-4 py-3 font-semibold">Action</th>
            <th class="px-4 py-3 font-semibold">After Update</th>
            <th class="px-4 py-3 font-semibold">Difference</th>
            <th x-show="canViewCost" class="px-4 py-3 font-semibold">Cost / Mb/s</th>
            <th x-show="canViewCost" class="px-4 py-3 font-semibold">Total Cost</th>
            <th class="px-4 py-3 font-semibold">Date</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[rgba(255,255,255,0.06)]">
          <template x-if="loadingNodes">
            <tr><td :colspan="canViewCost ? 10 : 8" class="px-4 py-10 text-center text-sm text-[#64748b]">Loading...</td></tr>
          </template>
          <template x-if="!loadingNodes && reviewRows().length === 0">
            <tr><td :colspan="canViewCost ? 10 : 8" class="px-4 py-10 text-center text-sm text-[#64748b]">No capacity updates found.</td></tr>
          </template>
          <template x-for="action in reviewRows()" :key="'review-action-' + action.id">
            <tr class="hover:bg-white/[0.03]">
              <td class="px-4 py-3 text-sm text-[#f1f5f9]" x-text="action.node_province"></td>
              <td class="px-4 py-3 text-sm font-semibold text-[#f1f5f9]" x-text="action.node_name"></td>
              <td class="px-4 py-3 text-sm text-[#94a3b8]" x-text="action.node_type"></td>
              <td class="px-4 py-3 font-mono text-sm text-[#94a3b8]" x-text="capacity(action.capacity_before_iqd)"></td>
              <td class="px-4 py-3"><span class="text-xs font-semibold px-2 py-0.5 rounded-full" :class="typeClass(action.type)" x-text="action.type"></span></td>
              <td class="px-4 py-3 font-mono text-sm text-[#f1f5f9]" x-text="capacity(action.capacity_after_iqd)"></td>
              <td class="px-4 py-3 font-mono text-sm" :class="action.type === 'upgrade' ? 'text-emerald-300' : 'text-red-300'" x-text="signedCapacity(action)"></td>
              <td x-show="canViewCost" class="px-4 py-3 font-mono text-sm text-[#94a3b8]" x-text="money(action.cost_per_mbps_iqd)"></td>
              <td x-show="canViewCost" class="px-4 py-3 font-mono text-sm" :class="Number(action.total_cost_iqd || 0) >= 0 ? 'text-emerald-300' : 'text-red-300'" x-text="signedMoney(action.total_cost_iqd)"></td>
              <td class="px-4 py-3 text-sm text-[#94a3b8]" x-text="fmtDateOnly(action.action_at)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

  <div x-show="tab === 'actions'" x-cloak class="space-y-4">
    <div class="flex items-center justify-between gap-3 flex-wrap">
      <div class="relative flex-1 min-w-[240px] max-w-md">
        <input x-model.debounce.250ms="actionSearch" type="search" placeholder="Search province, name, or node type" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] px-3 py-2 text-sm text-[#f1f5f9] placeholder-[#64748b] focus:outline-none focus:border-teal-500/50">
      </div>
      <button type="button" @click="loadActions()" class="px-3 py-2 rounded-lg border border-[rgba(255,255,255,0.08)] text-sm text-[#94a3b8] hover:text-[#f1f5f9] hover:border-teal-500/40">Refresh</button>
    </div>
    <div class="overflow-x-auto rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#111827]">
      <table class="min-w-full divide-y divide-[rgba(255,255,255,0.08)]">
        <thead class="bg-[#1a2236]">
          <tr class="text-left text-xs uppercase tracking-wide text-[#94a3b8]">
            <th class="px-4 py-3 font-semibold">Province</th>
            <th class="px-4 py-3 font-semibold">Name</th>
            <th class="px-4 py-3 font-semibold">Node Type</th>
            <th class="px-4 py-3 font-semibold">Date</th>
            <th class="px-4 py-3 font-semibold">Action</th>
            <th class="px-4 py-3 font-semibold">Amount</th>
            <th x-show="canViewCost" class="px-4 py-3 font-semibold">Cost / Mb/s</th>
            <th x-show="canViewCost" class="px-4 py-3 font-semibold">Total Cost</th>
            <th class="px-4 py-3 font-semibold">Before</th>
            <th class="px-4 py-3 font-semibold">After</th>
            <th class="px-4 py-3 font-semibold text-right">Edit</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[rgba(255,255,255,0.06)]">
          <template x-if="loadingActions">
            <tr><td :colspan="canViewCost ? 11 : 9" class="px-4 py-10 text-center text-sm text-[#64748b]">Loading...</td></tr>
          </template>
          <template x-if="!loadingActions && filteredActions().length === 0">
            <tr><td :colspan="canViewCost ? 11 : 9" class="px-4 py-10 text-center text-sm text-[#64748b]">No capacity actions yet.</td></tr>
          </template>
          <template x-for="action in filteredActions()" :key="action.id">
            <tr class="hover:bg-white/[0.03]">
              <td class="px-4 py-3 text-sm text-[#f1f5f9]" x-text="action.node_province"></td>
              <td class="px-4 py-3 text-sm font-semibold text-[#f1f5f9]" x-text="action.node_name"></td>
              <td class="px-4 py-3 text-sm text-[#94a3b8]" x-text="action.node_type"></td>
              <td class="px-4 py-3 text-sm text-[#94a3b8]" x-text="fmtDateOnly(action.action_at)"></td>
              <td class="px-4 py-3"><span class="text-xs font-semibold px-2 py-0.5 rounded-full" :class="typeClass(action.type)" x-text="action.type"></span></td>
              <td class="px-4 py-3 font-mono text-sm" :class="action.type === 'upgrade' ? 'text-emerald-300' : 'text-red-300'" x-text="signedCapacity(action)"></td>
              <td x-show="canViewCost" class="px-4 py-3 font-mono text-sm text-[#94a3b8]" x-text="money(action.cost_per_mbps_iqd)"></td>
              <td x-show="canViewCost" class="px-4 py-3 font-mono text-sm" :class="Number(action.total_cost_iqd || 0) >= 0 ? 'text-emerald-300' : 'text-red-300'" x-text="signedMoney(action.total_cost_iqd)"></td>
              <td class="px-4 py-3 font-mono text-sm text-[#94a3b8]" x-text="capacity(action.capacity_before_iqd)"></td>
              <td class="px-4 py-3 font-mono text-sm text-[#f1f5f9]" x-text="capacity(action.capacity_after_iqd)"></td>
              <td class="px-4 py-3 text-right">
                <button type="button" @click="openActionModal(null, action)" class="text-xs text-teal-400 hover:underline">Edit</button>
                <button type="button" @click="deleteAction(action)" class="ml-3 text-xs text-red-400 hover:underline">Delete</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

  <div x-show="tab === 'history'" x-cloak class="grid grid-cols-1 lg:grid-cols-[220px_1fr] gap-4">
    <aside class="rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#111827] p-3 h-fit">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-[#f1f5f9]">Days</h2>
        <button type="button" @click="refreshHistory()" class="text-xs text-teal-400 hover:underline">Refresh</button>
      </div>
      <template x-if="historyDays.length === 0">
        <p class="text-sm text-[#64748b] py-4">No history yet.</p>
      </template>
      <div class="space-y-1 max-h-[28rem] overflow-y-auto pr-1">
        <template x-for="day in historyDays" :key="day">
          <button type="button" @click="selectDay(day)" class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors" :class="selectedDay === day ? 'bg-teal-500/20 text-teal-300' : 'text-[#94a3b8] hover:bg-white/5 hover:text-[#f1f5f9]'">
            <span x-text="day"></span>
          </button>
        </template>
      </div>
    </aside>
    <section class="space-y-4 min-w-0">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <h2 class="text-lg font-semibold text-[#f1f5f9]" x-text="historyScope === 'all' ? 'Whole History' : (selectedDay ? ('History for ' + selectedDay) : 'History')"></h2>
        <div class="flex items-center gap-2 flex-wrap">
          <input type="date" x-model="selectedDay" @change="setHistoryScope('day')" class="rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] px-3 py-2 text-sm text-[#f1f5f9]">
          <div class="flex gap-1 p-1 rounded-lg bg-[#111827] border border-[rgba(255,255,255,0.08)]">
            <button type="button" @click="setHistoryScope('day')" class="px-3 py-1.5 rounded-md text-xs font-semibold" :class="historyScope === 'day' ? 'bg-teal-500/20 text-teal-300' : 'text-[#94a3b8] hover:text-[#f1f5f9]'">This Day</button>
            <button type="button" @click="setHistoryScope('all')" class="px-3 py-1.5 rounded-md text-xs font-semibold" :class="historyScope === 'all' ? 'bg-teal-500/20 text-teal-300' : 'text-[#94a3b8] hover:text-[#f1f5f9]'">Whole History</button>
          </div>
          <button type="button" @click="exportHistoryExcel()" :disabled="!historyRows().length" class="px-3 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-semibold">Export Excel</button>
          <button type="button" @click="refreshHistory()" class="px-3 py-2 rounded-lg border border-[rgba(255,255,255,0.08)] text-sm text-[#94a3b8] hover:text-[#f1f5f9] hover:border-teal-500/40">Refresh</button>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <select x-model="historyFilter.province" class="rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] px-3 py-2 text-sm text-[#f1f5f9] focus:outline-none focus:border-teal-500/50">
          <option value="">All provinces</option>
          <template x-for="province in provinceOptions()" :key="'history-province-' + province">
            <option :value="province" x-text="province"></option>
          </template>
        </select>
        <select x-model="historyFilter.type" class="rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] px-3 py-2 text-sm text-[#f1f5f9] focus:outline-none focus:border-teal-500/50">
          <option value="">All node types</option>
          <template x-for="type in typeOptions()" :key="'history-type-' + type">
            <option :value="type" x-text="type"></option>
          </template>
        </select>
        <select x-model="historyFilter.name" class="rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#111827] px-3 py-2 text-sm text-[#f1f5f9] focus:outline-none focus:border-teal-500/50">
          <option value="">All names</option>
          <template x-for="name in nameOptions()" :key="'history-name-' + name">
            <option :value="name" x-text="name"></option>
          </template>
        </select>
      </div>

      <div class="overflow-x-auto rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#111827]">
        <table class="min-w-full divide-y divide-[rgba(255,255,255,0.08)]">
          <thead class="bg-[#1a2236]">
            <tr class="text-left text-xs uppercase tracking-wide text-[#94a3b8]">
              <th class="px-4 py-3 font-semibold">Province</th>
              <th class="px-4 py-3 font-semibold">Name</th>
              <th class="px-4 py-3 font-semibold">Type</th>
              <th class="px-4 py-3 font-semibold">Current</th>
              <th x-show="canViewCost" class="px-4 py-3 font-semibold">Total Cost</th>
              <th class="px-4 py-3 font-semibold">Date</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-[rgba(255,255,255,0.06)]">
            <template x-if="loadingHistory">
              <tr><td :colspan="canViewCost ? 6 : 5" class="px-4 py-8 text-center text-sm text-[#64748b]">Loading...</td></tr>
            </template>
            <template x-if="!loadingHistory && historyRows().length === 0">
              <tr><td :colspan="canViewCost ? 6 : 5" class="px-4 py-8 text-center text-sm text-[#64748b]">No capacity history found.</td></tr>
            </template>
            <template x-for="row in historyRows()" :key="row.row_key">
              <tr>
                <td class="px-4 py-3 text-sm text-[#f1f5f9]" x-text="row.node_province"></td>
                <td class="px-4 py-3 text-sm font-semibold text-[#f1f5f9]" x-text="row.node_name"></td>
                <td class="px-4 py-3 text-sm text-[#94a3b8]" x-text="row.node_type"></td>
                <td class="px-4 py-3 font-mono text-sm text-[#f1f5f9]" x-text="capacity(row.current_capacity_iqd)"></td>
                <td x-show="canViewCost" class="px-4 py-3 font-mono text-sm" :class="Number(row.total_cost_iqd || 0) >= 0 ? 'text-emerald-300' : 'text-red-300'" x-text="signedMoney(row.total_cost_iqd)"></td>
                <td class="px-4 py-3 text-sm text-[#94a3b8]" x-text="fmtDateOnly(row.latest_action_at)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <div x-show="nodeModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60">
    <div @click.away="nodeModal = false" class="w-full max-w-md rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#111827] p-6 shadow-2xl">
      <h3 class="text-lg font-semibold text-[#f1f5f9] mb-4" x-text="nodeForm.id ? 'Edit Node' : 'Add Node'"></h3>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-[#94a3b8] mb-1">Province</label>
          <input x-model="nodeForm.province" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9]">
        </div>
        <div>
          <label class="block text-xs text-[#94a3b8] mb-1">Name</label>
          <input x-model="nodeForm.name" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9]">
        </div>
        <div>
          <label class="block text-xs text-[#94a3b8] mb-1">Type</label>
          <input x-model="nodeForm.type" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9]">
        </div>
        <div>
          <label class="block text-xs text-[#94a3b8] mb-1">Initial Capacity Mb/s</label>
          <input type="number" min="0" step="1" x-model.number="nodeForm.initial_capacity_iqd" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9]">
        </div>
        <p class="text-xs text-red-400" x-show="formError" x-text="formError"></p>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button type="button" @click="nodeModal = false" class="px-4 py-2 text-sm text-[#94a3b8]">Cancel</button>
        <button type="button" @click="saveNode()" class="px-4 py-2 rounded-lg bg-teal-600 hover:bg-teal-500 text-sm font-semibold text-white">Save</button>
      </div>
    </div>
  </div>

  <div x-show="actionModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60">
    <div @click.away="actionModal = false" class="w-full max-w-lg rounded-xl border border-[rgba(255,255,255,0.08)] bg-[#111827] p-6 shadow-2xl">
      <h3 class="text-lg font-semibold text-[#f1f5f9] mb-4" x-text="actionForm.id ? 'Edit Action' : 'Add Action'"></h3>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-[#94a3b8] mb-1">Node</label>
          <select x-model.number="actionForm.node_id" :disabled="!!actionForm.id" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9] disabled:opacity-60">
            <option value="0">Select node</option>
            <template x-for="node in nodes" :key="node.id">
              <option :value="node.id" x-text="nodeLabel(node)"></option>
            </template>
          </select>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-[#94a3b8] mb-1">Type</label>
            <select x-model="actionForm.type" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9]">
              <option value="upgrade">Upgrade</option>
              <option value="downgrade">Downgrade</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-[#94a3b8] mb-1">Amount Mb/s</label>
            <input type="number" min="1" step="1" x-model.number="actionForm.amount_iqd" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9]">
          </div>
        </div>
        <div x-show="canViewCost">
          <label class="block text-xs text-[#94a3b8] mb-1">Cost / Mb/s IQD</label>
          <input type="number" min="0" step="1" x-model.number="actionForm.cost_per_mbps_iqd" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9]">
        </div>
        <div>
          <label class="block text-xs text-[#94a3b8] mb-1">Action Time</label>
          <input type="datetime-local" x-model="actionForm.action_at" class="w-full rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] px-3 py-2 text-sm text-[#f1f5f9]">
        </div>
        <p class="text-xs text-red-400" x-show="formError" x-text="formError"></p>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button type="button" @click="actionModal = false" class="px-4 py-2 text-sm text-[#94a3b8]">Cancel</button>
        <button type="button" @click="saveAction()" class="px-4 py-2 rounded-lg bg-teal-600 hover:bg-teal-500 text-sm font-semibold text-white">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
function ipCapacitiesPage() {
  return {
    timeOffsetMs: -3 * 60 * 60 * 1000,
    tab: 'review',
    canViewCost: false,
    nodes: [],
    actions: [],
    historyDays: [],
    selectedDay: '',
    dayHistory: { summaries: [], actions: [] },
    allHistory: [],
    search: '',
    actionSearch: '',
    historyScope: 'day',
    historyFilter: { province: '', type: '', name: '' },
    error: '',
    formError: '',
    loadingNodes: false,
    loadingActions: false,
    loadingHistory: false,
    importing: false,
    nodeModal: false,
    actionModal: false,
    selectedNodeDeleteId: 0,
    nodeForm: { id: 0, province: '', name: '', type: '', initial_capacity_iqd: 0 },
    actionForm: { id: 0, node_id: 0, type: 'upgrade', amount_iqd: 0, cost_per_mbps_iqd: 0, action_at: '' },

    async init() {
      await this.refreshAll();
    },
    setTab(next) {
      this.tab = next;
      if (next === 'review') this.loadActions();
      if (next === 'actions') this.loadActions();
      if (next === 'history') {
        this.loadActions();
        this.loadHistoryDays();
      }
    },
    async refreshAll() {
      await Promise.all([this.loadNodes(), this.loadActions(), this.loadHistoryDays()]);
    },
    async api(path, options) {
      this.error = '';
      const res = await fetch('/api/ip/capacities' + path, Object.assign({ credentials: 'same-origin' }, options || {}));
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    },
    async loadNodes() {
      this.loadingNodes = true;
      try {
        const params = this.search ? ('?search=' + encodeURIComponent(this.search)) : '';
        const data = await this.api('/nodes' + params);
        this.canViewCost = !!data.can_view_cost;
        this.nodes = data.nodes || [];
        if (this.selectedNodeDeleteId && !this.nodes.some(node => Number(node.id) === Number(this.selectedNodeDeleteId))) {
          this.selectedNodeDeleteId = 0;
        }
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loadingNodes = false;
      }
    },
    async loadActions() {
      this.loadingActions = true;
      try {
        const data = await this.api('/actions');
        this.canViewCost = !!data.can_view_cost;
        this.actions = data.actions || [];
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loadingActions = false;
      }
    },
    async importExcel(event) {
      const file = event.target.files && event.target.files[0];
      event.target.value = '';
      if (!file) return;
      if (typeof XLSX === 'undefined') {
        this.error = 'Excel import library is not loaded';
        return;
      }
      this.importing = true;
      this.error = '';
      try {
        const rows = await this.readCapacityImportRows(file);
        if (!rows.length) throw new Error('No import rows found');
        const data = await this.api('/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rows })
        });
        this.canViewCost = !!data.can_view_cost;
        this.nodes = data.nodes || [];
        this.actions = data.actions || [];
        await this.loadHistoryDays();
        this.tab = 'actions';
      } catch (e) {
        this.error = e.message;
      } finally {
        this.importing = false;
      }
    },
    readCapacityImportRows(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
            resolve(rawRows.map((row, index) => this.normalizeImportRow(row, index)).filter(Boolean));
          } catch (err) {
            reject(err);
          }
        };
        reader.onerror = () => reject(new Error('Could not read Excel file'));
        reader.readAsArrayBuffer(file);
      });
    },
    normalizeImportRow(row, index) {
      const value = (...names) => {
        for (const key of Object.keys(row)) {
          const normalized = this.normalizeHeader(key);
          if (names.some((name) => normalized === this.normalizeHeader(name))) return row[key];
        }
        return '';
      };
      const name = String(value('name') || '').trim();
      const province = String(value('province') || '').trim();
      const type = String(value('type', 'node type') || '').trim();
      const action = String(value('action') || '').trim().toLowerCase();
      const before = this.importNumber(value('total capacity before update', 'before update', 'capacity before'));
      const difference = Math.abs(this.importNumber(value('difference', 'amount', 'action mb/s', 'action gb/s')));
      const costPerMbps = this.importNumber(value('cost per mb/s', 'cost/mbps', 'cost per mbps', 'cost'));
      const actionAt = this.importDate(value('date / time', 'date/time', 'date time', 'action time', 'time'));
      const empty = !name && !province && !type && !action && before === 0 && difference === 0 && !actionAt;
      if (empty) return null;
      if (!name || !province || !type || !action || !difference || !actionAt) {
        throw new Error('Row ' + (index + 2) + ' is missing Name, Province, Type, Action, Difference, or Date / Time');
      }
      if (!['upgrade', 'downgrade'].includes(action)) {
        throw new Error('Row ' + (index + 2) + ' action must be Upgrade or Downgrade');
      }
      return {
        name,
        province,
        type,
        capacity_before_update_iqd: before,
        action,
        difference_iqd: difference,
        cost_per_mbps_iqd: costPerMbps,
        action_at: actionAt
      };
    },
    normalizeHeader(value) {
      return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    },
    importNumber(value) {
      if (typeof value === 'number') return value;
      const cleaned = String(value || '').replace(/,/g, '').trim();
      const parsed = Number(cleaned);
      return Number.isFinite(parsed) ? parsed : 0;
    },
    importDate(value) {
      if (!value) return '';
      if (value instanceof Date && !Number.isNaN(value.getTime())) {
        return this.rawActionTime(this.datetimeLocal(value.toISOString(), false));
      }
      const raw = String(value).trim();
      const parsed = new Date(raw);
      if (!Number.isNaN(parsed.getTime())) return this.rawActionTime(this.datetimeLocal(parsed.toISOString(), false));
      return raw;
    },
    async loadHistoryDays() {
      try {
        const data = await this.api('/history/days');
        this.historyDays = data.days || [];
        if (this.selectedDay && !this.historyDays.includes(this.selectedDay)) this.selectedDay = '';
        if (!this.selectedDay && this.historyDays.length) this.selectedDay = this.historyDays[0];
        if (!this.selectedDay) this.selectedDay = this.todayDate();
        if (this.selectedDay) await this.loadDayHistory();
        else this.dayHistory = { summaries: [], actions: [] };
      } catch (e) {
        this.error = e.message;
      }
    },
    async selectDay(day) {
      this.historyScope = 'day';
      this.selectedDay = day;
      await this.loadDayHistory();
    },
    async setHistoryScope(scope) {
      this.historyScope = scope;
      if (scope === 'all') await this.loadAllHistory();
      if (scope === 'day') await this.loadDayHistory();
    },
    async refreshHistory() {
      await this.loadHistoryDays();
      if (this.historyScope === 'all') await this.loadAllHistory();
    },
    async loadDayHistory() {
      if (!this.selectedDay) {
        this.dayHistory = { summaries: [], actions: [] };
        return;
      }
      this.loadingHistory = true;
      try {
        const data = await this.api('/history/day?date=' + encodeURIComponent(this.selectedDay));
        this.canViewCost = !!data.can_view_cost;
        this.dayHistory = data.history || { summaries: [], actions: [] };
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loadingHistory = false;
      }
    },
    async loadAllHistory() {
      this.loadingHistory = true;
      try {
        const data = await this.api('/history/all');
        this.canViewCost = !!data.can_view_cost;
        this.allHistory = data.history || [];
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loadingHistory = false;
      }
    },
    openNodeModal(node) {
      this.formError = '';
      this.nodeForm = node ? {
        id: node.id,
        province: node.province || '',
        name: node.name,
        type: node.type || '',
        initial_capacity_iqd: node.initial_capacity_iqd
      } : { id: 0, province: '', name: '', type: '', initial_capacity_iqd: 0 };
      this.nodeModal = true;
    },
    async saveNode() {
      this.formError = '';
      const payload = {
        province: (this.nodeForm.province || '').trim(),
        name: (this.nodeForm.name || '').trim(),
        type: (this.nodeForm.type || '').trim(),
        initial_capacity_iqd: Number(this.nodeForm.initial_capacity_iqd || 0)
      };
      if (!payload.province) { this.formError = 'Province is required'; return; }
      if (!payload.name) { this.formError = 'Node is required'; return; }
      if (!payload.type) { this.formError = 'Type is required'; return; }
      if (payload.initial_capacity_iqd < 0) { this.formError = 'Initial capacity cannot be negative'; return; }
      try {
        const path = this.nodeForm.id ? '/nodes/' + this.nodeForm.id : '/nodes';
        const method = this.nodeForm.id ? 'PUT' : 'POST';
        await this.api(path, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        this.nodeModal = false;
        await this.refreshAll();
      } catch (e) {
        this.formError = e.message;
      }
    },
    async deleteSelectedNode() {
      const node = this.nodes.find(item => Number(item.id) === Number(this.selectedNodeDeleteId));
      if (!node) return;
      if (!confirm('Delete ' + this.nodeLabel(node) + ' and all capacity actions for this row?')) return;
      try {
        await this.api('/nodes/' + node.id, { method: 'DELETE' });
        this.selectedNodeDeleteId = 0;
        await this.refreshAll();
      } catch (e) {
        this.error = e.message;
      }
    },
    async openActionModal(node, action) {
      this.formError = '';
      if (!node && !action && this.search) {
        this.search = '';
        await this.loadNodes();
      }
      if (action) {
        this.actionForm = {
          id: action.id,
          node_id: action.node_id,
          type: action.type,
          amount_iqd: action.amount_iqd,
          cost_per_mbps_iqd: action.cost_per_mbps_iqd || 0,
          action_at: this.datetimeLocal(action.action_at, true)
        };
      } else {
        this.actionForm = {
          id: 0,
          node_id: node ? node.id : 0,
          type: 'upgrade',
          amount_iqd: 0,
          cost_per_mbps_iqd: 0,
          action_at: this.datetimeLocal(new Date().toISOString(), true)
        };
      }
      this.actionModal = true;
    },
    async saveAction() {
      this.formError = '';
      const payload = {
        node_id: Number(this.actionForm.node_id || 0),
        type: this.actionForm.type,
        amount_iqd: Number(this.actionForm.amount_iqd || 0),
        cost_per_mbps_iqd: this.canViewCost ? Number(this.actionForm.cost_per_mbps_iqd || 0) : 0,
        action_at: this.rawActionTime(this.actionForm.action_at)
      };
      if (!payload.node_id) { this.formError = 'Node is required'; return; }
      if (!['upgrade', 'downgrade'].includes(payload.type)) { this.formError = 'Type is required'; return; }
      if (payload.amount_iqd <= 0) { this.formError = 'Amount must be greater than 0'; return; }
      if (payload.cost_per_mbps_iqd < 0) { this.formError = 'Cost cannot be negative'; return; }
      try {
        const path = this.actionForm.id ? '/actions/' + this.actionForm.id : '/actions';
        const method = this.actionForm.id ? 'PUT' : 'POST';
        await this.api(path, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        this.actionModal = false;
        await this.refreshAll();
      } catch (e) {
        this.formError = e.message;
      }
    },
    async deleteAction(action) {
      if (!confirm('Delete this capacity action?')) return;
      try {
        await this.api('/actions/' + action.id, { method: 'DELETE' });
        await this.refreshAll();
      } catch (e) {
        this.error = e.message;
      }
    },
    typeClass(type) {
      return type === 'upgrade'
        ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/25'
        : 'bg-red-500/20 text-red-300 border border-red-500/25';
    },
    nodeLabel(node) {
      return [node.province, node.name, node.type].filter(Boolean).join(' / ');
    },
    filteredActions() {
      const q = String(this.actionSearch || '').trim().toLowerCase();
      const rows = Array.isArray(this.actions) ? this.actions : [];
      if (!q) return rows;
      return rows.filter((action) => [
        action.node_province,
        action.node_name,
        action.node_type
      ].some((value) => String(value || '').toLowerCase().includes(q)));
    },
    provinceOptions() {
      return this.uniqueSorted((Array.isArray(this.nodes) ? this.nodes : []).map((node) => node.province));
    },
    typeOptions() {
      return this.uniqueSorted((Array.isArray(this.nodes) ? this.nodes : []).map((node) => node.type));
    },
    nameOptions() {
      return this.uniqueSorted((Array.isArray(this.nodes) ? this.nodes : []).map((node) => node.name));
    },
    uniqueSorted(values) {
      return Array.from(new Set(values.map((value) => String(value || '').trim()).filter(Boolean)))
        .sort((a, b) => a.localeCompare(b));
    },
    rowMatchesHistoryFilter(row) {
      const province = String(this.historyFilter.province || '').trim().toLowerCase();
      const type = String(this.historyFilter.type || '').trim().toLowerCase();
      const name = String(this.historyFilter.name || '').trim().toLowerCase();
      if (province && String(row.node_province || '').toLowerCase() !== province) return false;
      if (type && String(row.node_type || '').toLowerCase() !== type) return false;
      if (name && String(row.node_name || '').toLowerCase() !== name) return false;
      return true;
    },
    reviewRows() {
      const q = String(this.search || '').trim().toLowerCase();
      const rows = (Array.isArray(this.nodes) ? this.nodes : [])
        .filter((node) => node.latest_action)
        .map((node) => ({
          id: node.latest_action.id,
          node_id: node.id,
          node_province: node.province,
          node_name: node.name,
          node_type: node.type,
          type: node.latest_action.type,
          amount_iqd: node.latest_action.amount_iqd,
          cost_per_mbps_iqd: node.latest_action.cost_per_mbps_iqd || 0,
          total_cost_iqd: node.latest_action.total_cost_iqd || 0,
          capacity_before_iqd: node.latest_action.capacity_before_iqd,
          capacity_after_iqd: node.latest_action.capacity_after_iqd,
          action_at: node.latest_action.action_at
        }));
      if (!q) return rows;
      return rows.filter((action) => [
        action.node_province,
        action.node_name,
        action.node_type,
        action.type,
        action.amount_iqd,
        action.capacity_before_iqd,
        action.capacity_after_iqd,
        action.cost_per_mbps_iqd,
        action.total_cost_iqd,
        action.action_at
      ].some((value) => String(value || '').toLowerCase().includes(q)));
    },
    historyRows() {
      if (this.historyScope === 'all') {
        const seenChanges = new Set();
        return (Array.isArray(this.allHistory) ? this.allHistory : [])
          .map((action) => ({
            row_key: 'history-' + action.node_id + '-' + action.latest_action_at,
            node_id: action.node_id,
            node_province: action.node_province,
            node_name: action.node_name,
            node_type: action.node_type,
            current_capacity_iqd: action.current_capacity_iqd,
            total_cost_iqd: action.total_cost_iqd || 0,
            day: action.day,
            latest_action_at: action.latest_action_at
          }))
          .filter((row) => row.latest_action_at && !String(row.latest_action_at).startsWith('0001-01-01'))
          .filter((row) => this.rowMatchesHistoryFilter(row))
          .filter((row) => {
            const changeKey = row.node_id + '|' + row.latest_action_at;
            if (seenChanges.has(changeKey)) return false;
            seenChanges.add(changeKey);
            return true;
          })
          .sort((a, b) => new Date(b.latest_action_at).getTime() - new Date(a.latest_action_at).getTime());
      }
      return (Array.isArray(this.dayHistory.summaries) ? this.dayHistory.summaries : [])
        .map((row) => ({
          row_key: 'day-' + row.node_id,
          node_province: row.node_province,
          node_name: row.node_name,
          node_type: row.node_type,
          current_capacity_iqd: row.closing_capacity_iqd,
          total_cost_iqd: row.total_cost_iqd || 0,
          day: this.selectedDay,
          latest_action_at: row.latest_action_at
        }))
        .filter((row) => this.rowMatchesHistoryFilter(row));
    },
    todayDate() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    },
    capacity(value) {
      return new Intl.NumberFormat('en-US').format(Number(value || 0)) + ' Mb/s';
    },
    money(value) {
      return new Intl.NumberFormat('en-US').format(Number(value || 0)) + ' IQD';
    },
    signedMoney(value) {
      const n = Number(value || 0);
      return (n >= 0 ? '+' : '-') + this.money(Math.abs(n));
    },
    capacityWithSign(value) {
      const n = Number(value || 0);
      return (n >= 0 ? '+' : '-') + this.capacity(Math.abs(n));
    },
    signedCapacity(action) {
      const sign = action.type === 'upgrade' ? '+' : '-';
      return sign + this.capacity(action.amount_iqd);
    },
    exportHistoryExcel() {
      if (typeof XLSX === 'undefined') {
        this.error = 'Excel export library is not loaded';
        return;
      }
      const rows = this.historyRows().map((row) => {
        const out = {
          Province: row.node_province || '',
          Name: row.node_name || '',
          Type: row.node_type || '',
          'Current Capacity Mb/s': Number(row.current_capacity_iqd || 0),
          Date: this.fmtDateOnly(row.latest_action_at)
        };
        if (this.canViewCost) out['Total Cost IQD'] = Number(row.total_cost_iqd || 0);
        return out;
      });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length ? rows : [{}]), 'History');
      XLSX.writeFile(wb, 'ip-capacities-history-' + (this.historyScope === 'all' ? 'all' : (this.selectedDay || 'latest')) + '.xlsx');
    },
    adjustedDate(value) {
      if (!value) return null;
      return new Date(new Date(value).getTime() + this.timeOffsetMs);
    },
    fmtDateTime(value) {
      if (!value || String(value).startsWith('0001-01-01')) return '-';
      const d = this.adjustedDate(value);
      return d ? d.toLocaleString() : '-';
    },
    fmtDateOnly(value) {
      if (!value || String(value).startsWith('0001-01-01')) return '-';
      const d = this.adjustedDate(value);
      if (!d) return '-';
      const pad = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '/' + pad(d.getMonth() + 1) + '/' + pad(d.getDate());
    },
    datetimeLocal(value, applyOffset) {
      const d = applyOffset ? this.adjustedDate(value) : new Date(value);
      const pad = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    },
    rawActionTime(value) {
      if (!value) return '';
      const raw = new Date(new Date(value).getTime() - this.timeOffsetMs);
      return this.datetimeLocal(raw.toISOString(), false);
    }
  };
}
</script>
