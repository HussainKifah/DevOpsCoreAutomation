{{define "content"}}
<div x-data="cmdOutputPage()" x-init="init()">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-[#f1f5f9]">Command Output</h1>
      <p class="text-sm text-[#94a3b8] mt-0.5">History of all custom commands executed on IP team devices</p>
    </div>
    <button @click="fetchRuns()" :disabled="refreshing" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-[rgba(255,255,255,0.08)] text-[#94a3b8] hover:text-[#f1f5f9] hover:bg-white/5 transition-colors disabled:opacity-50">
      <svg :class="refreshing ? 'animate-spin' : ''" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
      Refresh
    </button>
  </div>

  <!-- Filters -->
  <div class="flex flex-wrap gap-3 mb-5">
    <input type="text" x-model.debounce.250ms="search" placeholder="Search device, host, or command..."
      class="rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] text-[#f1f5f9] placeholder-[#475569] px-3 py-2 text-sm w-64 focus:ring-2 focus:ring-[#3b82f6] focus:border-[#3b82f6]">
    <select x-model="filterDevice"
      class="rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] text-[#f1f5f9] px-3 py-2 text-sm focus:ring-2 focus:ring-[#3b82f6]">
      <option value="">All Devices</option>
      <template x-for="d in uniqueDevices" :key="d">
        <option :value="d" x-text="d"></option>
      </template>
    </select>
    <select x-model="filterStatus"
      class="rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] text-[#f1f5f9] px-3 py-2 text-sm focus:ring-2 focus:ring-[#3b82f6]">
      <option value="">All Status</option>
      <option value="ok">OK</option>
      <option value="error">Error</option>
    </select>
    <span class="ml-auto text-sm text-[#475569] self-center" x-text="filtered.length + ' results'"></span>
  </div>

  <!-- Loading -->
  <template x-if="loading">
    <div class="space-y-3">
      <div class="h-20 rounded-xl bg-[#1a2236] animate-pulse"></div>
      <div class="h-20 rounded-xl bg-[#1a2236] animate-pulse"></div>
      <div class="h-20 rounded-xl bg-[#1a2236] animate-pulse"></div>
    </div>
  </template>

  <template x-if="!loading">
    <div>
      <template x-if="filtered.length === 0">
        <div class="flex flex-col items-center justify-center py-20 rounded-xl bg-[#1a2236] border border-[rgba(255,255,255,0.08)] text-[#94a3b8]">
          <svg class="w-12 h-12 mb-3 opacity-30" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/></svg>
          <p class="text-sm">No command runs found.</p>
        </div>
      </template>

      <div class="space-y-2">
        <template x-for="r in paginated" :key="r.id">
          <div class="mission-card bg-[#1a2236] rounded-xl border overflow-hidden transition-all"
            :class="r.status === 'error' ? 'border-[#ef4444]/30' : 'border-[rgba(255,255,255,0.08)]'">

            <!-- Row header (always visible) -->
            <div class="flex items-center gap-4 px-5 py-3.5 cursor-pointer select-none"
              @click="toggle(r.id)">
              <!-- Status -->
              <span class="w-2 h-2 rounded-full shrink-0"
                :class="{
                  'bg-[#10b981]': r.status === 'ok',
                  'bg-[#ef4444]': r.status === 'error',
                  'bg-[#f59e0b] animate-pulse': r.status === 'pending'
                }"></span>

              <!-- Device info -->
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="text-sm font-semibold text-[#f1f5f9]" x-text="r.device_name"></span>
                  <span class="inline-flex items-center gap-1 px-2 py-0.5 text-[10px] font-medium rounded bg-[#8b5cf6]/20 text-[#8b5cf6]">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/></svg>
                    CMD
                  </span>
                </div>
                <div class="flex items-center gap-3 mt-0.5 flex-wrap">
                  <span class="text-xs font-mono text-[#94a3b8]" x-text="r.host"></span>
                  <span class="text-[#475569]">·</span>
                  <code class="text-xs font-mono text-[#60a5fa] bg-[#3b82f6]/10 px-1.5 py-0.5 rounded" x-text="r.command || '—'"></code>
                </div>
              </div>

              <!-- Meta right -->
              <div class="shrink-0 flex flex-col items-end gap-1">
                <span class="text-xs text-[#94a3b8]" x-text="new Date(r.started_at).toLocaleString()"></span>
                <div class="flex items-center gap-2">
                  <span x-show="r.finished_at" class="text-[10px] text-[#475569]"
                    x-text="r.finished_at ? (((new Date(r.finished_at) - new Date(r.started_at)) / 1000).toFixed(1) + 's') : ''"></span>
                  <span class="text-[10px] font-mono text-[#475569]" x-text="formatBytes(r.output_size)"></span>
                </div>
              </div>

              <!-- Expand chevron -->
              <svg class="w-4 h-4 text-[#475569] shrink-0 transition-transform duration-200"
                :class="expanded[r.id] ? 'rotate-180' : ''"
                fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
              </svg>
            </div>

            <!-- Expanded output -->
            <div x-show="expanded[r.id]" x-transition x-cloak class="border-t border-[rgba(255,255,255,0.08)]">
              <!-- Error banner -->
              <template x-if="r.error_msg">
                <div class="flex items-start gap-2 px-5 py-3 bg-[#ef4444]/10 border-b border-[#ef4444]/20">
                  <svg class="w-4 h-4 text-[#ef4444] mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
                  <p class="text-xs text-[#ef4444] font-mono" x-text="r.error_msg"></p>
                </div>
              </template>

              <!-- Output toolbar -->
              <div class="flex items-center justify-between px-5 py-2 bg-[#0f1629]">
                <span class="text-[10px] text-[#475569] font-mono uppercase tracking-wider">Output</span>
                <div class="flex items-center gap-2">
                  <button @click="copyRunOutput(r)" class="inline-flex items-center gap-1 px-2 py-1 text-[10px] rounded text-[#94a3b8] hover:text-[#f1f5f9] hover:bg-white/5 transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg>
                    <span x-text="copiedId === r.id ? 'Copied!' : 'Copy'"></span>
                  </button>
                  <button @click="downloadRunOutput(r)" class="inline-flex items-center gap-1 px-2 py-1 text-[10px] rounded text-[#94a3b8] hover:text-[#3b82f6] hover:bg-[#3b82f6]/10 transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                    Download
                  </button>
                </div>
              </div>

              <!-- Loading output -->
              <template x-if="loadingOutput[r.id]">
                <div class="flex items-center gap-2 px-5 py-4 text-sm text-[#94a3b8]">
                  <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-[#3b82f6]"></div>
                  Loading output...
                </div>
              </template>

              <!-- Actual output -->
              <template x-if="!loadingOutput[r.id]">
                <pre class="px-5 py-4 text-xs font-mono text-[#94a3b8] overflow-x-auto max-h-80 leading-relaxed whitespace-pre-wrap bg-[#0a0e1a]"
                  x-text="outputCache[r.id] || '(empty output)'"></pre>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Pagination -->
      <div x-show="totalPages > 1" class="flex items-center justify-between mt-5">
        <span class="text-sm text-[#94a3b8]" x-text="'Page ' + page + ' of ' + totalPages"></span>
        <div class="flex gap-2">
          <button @click="page = Math.max(1, page - 1)" :disabled="page <= 1"
            class="px-3 py-1.5 text-sm rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] text-[#f1f5f9] disabled:opacity-40 hover:bg-white/5 transition-colors">Prev</button>
          <button @click="page = Math.min(totalPages, page + 1)" :disabled="page >= totalPages"
            class="px-3 py-1.5 text-sm rounded-lg border border-[rgba(255,255,255,0.08)] bg-[#1a2236] text-[#f1f5f9] disabled:opacity-40 hover:bg-white/5 transition-colors">Next</button>
        </div>
      </div>
    </div>
  </template>

</div>

<script>
function cmdOutputPage() {
  return {
    loading: true,
    refreshing: false,
    runs: [],
    search: '',
    filterDevice: '',
    filterStatus: '',
    expanded: {},
    outputCache: {},
    loadingOutput: {},
    copiedId: null,
    page: 1,
    perPage: 15,

    async init() {
      await this.fetchRuns();
      this.loading = false;

      // Auto-refresh on WS updates
      window.addEventListener('ws-update', (e) => {
        if (e.detail.type === 'workflow_cmd_update') this.fetchRuns();
      });
    },

    async fetchRuns() {
      this.refreshing = true;
      const res = await fetch('/api/workflows/runs?type=command');
      this.runs = (await res.json()) || [];
      this.page = 1;
      this.refreshing = false;
    },

    get uniqueDevices() {
      return [...new Set(this.runs.map(r => r.device_name).filter(Boolean))].sort();
    },

    get filtered() {
      return this.runs.filter(r => {
        if (this.filterDevice && r.device_name !== this.filterDevice) return false;
        if (this.filterStatus && r.status !== this.filterStatus) return false;
        if (this.search) {
          const q = this.search.toLowerCase();
          return (r.device_name || '').toLowerCase().includes(q) ||
                 (r.host || '').toLowerCase().includes(q) ||
                 (r.command || '').toLowerCase().includes(q);
        }
        return true;
      });
    },

    get totalPages() {
      return Math.max(1, Math.ceil(this.filtered.length / this.perPage));
    },

    get paginated() {
      const start = (this.page - 1) * this.perPage;
      return this.filtered.slice(start, start + this.perPage);
    },

    async toggle(id) {
      this.expanded = { ...this.expanded, [id]: !this.expanded[id] };
      if (this.expanded[id] && !this.outputCache[id]) {
        this.loadingOutput = { ...this.loadingOutput, [id]: true };
        try {
          const res = await fetch('/api/workflows/runs/' + id + '/output');
          const data = await res.json();
          this.outputCache = { ...this.outputCache, [id]: data.output || '' };
        } catch (e) {
          this.outputCache = { ...this.outputCache, [id]: '(failed to load output)' };
        }
        this.loadingOutput = { ...this.loadingOutput, [id]: false };
      }
    },

    copyRunOutput(r) {
      const text = this.outputCache[r.id] || '';
      navigator.clipboard.writeText(text).then(() => {
        this.copiedId = r.id;
        setTimeout(() => { this.copiedId = null; }, 2000);
      });
    },

    downloadRunOutput(r) {
      const text = this.outputCache[r.id] || '';
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const name = (r.device_name || r.host || 'output') + '_' + (r.started_at || '').slice(0, 10) + '.txt';
      a.download = name;
      a.click();
    },

    formatBytes(n) {
      if (!n) return '—';
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / (1024 * 1024)).toFixed(1) + ' MB';
    },
  };
}
</script>
{{end}}
